<!DOCTYPE html>
<html>
<head>
    <title>Admin | User Information</title>
    <link rel="stylesheet" href="../css/user-info.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/Admin.css">
</head>
<body class="user-info-page">

    <!-- Header -->
<header class="navbar">

    <!-- Logo -->
    <div class="logo">
        <img src="../images/Logos/logo_image.png" alt="Fanfinity Logo" id="img1">
    </div>

    <div class="page-title">User Information</div>
    <a href="Admin.html">
        <button class="dashboard-btn">Dashboard</button>
    </a>
    
</header>

 <!-- Back Button -->
 
 <!-- Total Users Card -->
        <a href="Admin.html" class="back-btn">
            <img src="../images/icons/arrow-93-16.png" alt="Back">
        </a>
    
    <div class="stat-card">
        <div class="stat-title">Total Users</div>
        <div class="stat-number" id="totalUsers">0</div>
    </div>

    <div class="user-table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone No</th>
                <th>City</th>
                <th>Joined On</th>
                <th>Total Orders</th>
                <th>Last Order ID</th>
                <th>Last Order Date</th>
                <th>Last Order Status</th>
            </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>

<script>
fetch("/api/me", { credentials: "include" })
.then(res => res.json())
.then(data => {
    if (!data.logged_in || data.user.role !== "admin") {
        alert("Access denied. Please login as admin.");
        window.location.href = "home.html";
    }
});
</script>
    <script src="../src/scripts/admin/Admin-userTable.js" defer></script>
    <script src="../src/scripts/admin/Admin_load_Nos.js" defer></script>

</body>
</html>
