<div class="add-product" id="productModal">
    <div class="product-form-container">
        <span class="close-btn" onclick="closeProductForm()">×</span>
        <h2>Add New Product</h2>

        <form class="product-form" id="addProductForm" enctype="multipart/form-data">

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="productImage" accept="image/*">
            </div>

            <div class="form-group">
                <label>Image Preview</label>
                <img id="productImagePreview" src="" alt="Preview"
                     style="width:120px;height:120px;object-fit:contain;border:1px solid #ccc;border-radius:8px;padding:6px;background:#fff;">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="productDesc" placeholder="Enter product description"></textarea>
            </div>

            <div class="form-group">
                <label>Keywords</label>
                <input type="text" id="keywords" placeholder="naruto, anime, figure">
            </div>

            <div class="form-group">
                <label>Specifications</label>
                <textarea id="specifications" placeholder="Material: PVC | Height: 20cm"></textarea>
            </div>

            <div class="form-group">
                <label>Ideal For</label>
                <input type="text" id="idealFor" placeholder="Collectors, anime fans">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" id="price" placeholder="₹ Price" step="0.01">
                </div>

                <div class="form-group">
                    <label>MRP</label>
                    <input type="number" id="mrp" placeholder="₹ MRP" step="0.01">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="discount" placeholder="Discount %">
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" placeholder="Stock quantity">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" id="rating" placeholder="4.5" step="0.1" min="0" max="5">
                </div>

                <div class="form-group">
                    <label>Reviews</label>
                    <input type="number" id="reviews" placeholder="120">
                </div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="anime">Anime</option>
                    <option value="games">Games</option>
                    <option value="movies">Movies</option>
                    <option value="series">Series</option>
                    <option value="kpop">Kpop</option>
                    <option value="pop">Pop</option>
                </select>
            </div>

            <div class="form-group" style="display:flex;flex-wrap:wrap;gap:18px;">
                <label><input type="checkbox" id="isNew"> Is New</label>
                <label><input type="checkbox" id="isPopular"> Is Popular</label>
                <label><input type="checkbox" id="isRecommended"> Is Recommended</label>
                <label><input type="checkbox" id="showOnHome"> Show On Home</label>
            </div>

            <button type="button" class="add-product-btn" onclick="addProduct()">
                Add Product
            </button>
        </form>
    </div>
</div>
<script>
fetch("/api/me", { credentials: "include" })
.then(res => res.json())
.then(data => {
    if (!data.role || data.role !== "admin") {
        alert("Access denied. Please login as admin.");
        window.location.href = "home.html";
    }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const imageInput = document.getElementById("productImage");
    const preview = document.getElementById("productImagePreview");

    if (imageInput && preview) {
        imageInput.addEventListener("change", function () {
            const file = this.files && this.files[0];
            if (!file) {
                preview.src = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const apiBase =
        window.location.port === "5500"
            ? "http://127.0.0.1:5000"
            : "";

    fetch(`${apiBase}/api/me`, { credentials: "include" })
        .then(res => {
            if (!res.ok) throw new Error("Not authorized");
            return res.json();
        })
        .then(data => {
            if (data.role !== "admin") {
                alert("Access denied. Please login as admin.");
                if (window.location.port === "5500") {
                    window.location.href = "http://127.0.0.1:5500/home.html";
                } else {
                    window.location.href = "/home.html";
                }
            }
        })
        .catch(() => {
            alert("Access denied. Please login as admin.");
            if (window.location.port === "5500") {
                window.location.href = "http://127.0.0.1:5500/home.html";
            } else {
                window.location.href = "/home.html";
            }
        });
});
</script>
