<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Fanfinity | Admin Dashboard</title>
    <link rel="stylesheet" href="../css/Admin.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/user-info.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar-admin">
     <div class="logo">
        <img src="../images/logo_image.png" alt="Fanfinity Logo" id="img1">
    </div>

    <div class="nav-center">
        <div class="nav-btn">Dashboard</div>
        <a href="user-info.html">
            <div class="nav-btn">Users</div>
        </a>
        <a href="product-info.html">
            <div class="nav-btn">Products</div>
        </a>
        <div class="nav-btn">LogOut</div>
    </div>

    <div class="nav-right">
        👤 Admin
    </div>
</div>

<div class="container">

    <!-- STATS -->
    <!-- STATS -->
<div class="stats">

    <div class="stat-card">
        <div class="stat-title">Total Users</div>
        <div class="stat-number" id="totalUsers">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Total posts</div>
        <div class="stat-number" id="totalPosts">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Approvals</div>
        <div class="stat-number" id="totalApprovals">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Returns</div>
        <div class="stat-number" id="totalReturns">0</div>
    </div>

</div>


    <!-- CATEGORIES + STATS -->
    <div class="section-grid">

        <div class="section-admin">
            <div class="section-header">Current Categories</div>
            <div class="categories">
                <div class="category"><a href="anime.html>"><img src="../images/products/erasebg-transformed.png" alt="Anime Logo" id="img1"></a></div>
                <div class="category"><a href="Movies_Series.html"><img src="../images/products/erasebg-transformed2.png" alt="Movie&Series Logo" id="img1"></a></div>
                <div class="category"><a href="Music.html"><img src="../images/products/musiclogo_2.png" alt="Music Logo" id="img1"></a></div>
                <div class="category"><a href="games.html"><img src="../images/products/Gamming_logo.png" alt="Games Logo" id="img1"></a></div>
                <!--Duplicate Logos-->              
                <div class="category"><a href="anime.html>"><img src="../images/products/erasebg-transformed.png" alt="Fanfinity Logo" id="img1"></a></div>
                <div class="category"><a href="Movies_Series.html"><img src="../images/products/erasebg-transformed2.png" alt="Fanfinity Logo" id="img1"></a></div>
                <div class="category"><a href="Music.html"><img src="../images/products/musiclogo_2.png" alt="Fanfinity Logo" id="img1"></a></div>
                <div class="category"><a href="games.html"><img src="../images/products/Gamming_logo.png" alt="Games Logo" id="img1"></a></div>

            </div>
            <button class="add-btn" onclick="openProductForm()">ADD +</button>
        </div>

        <div class="section-admin">
            <div class="section-header">Stats</div>
            <div class="chart">
                 <div class="chart">
                    <canvas id="categoryChart" height="250"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- PRODUCTS + USER INFO -->
    <div class="section-grid">

        <div class="section-admin">
            <div class="section-header">Products</div>
            <div class="products" id="productsContainer">

                <!-- here products will load dynamically so remove this static products-->

                <div class="product-img"></div>
                <div class="product-img"></div>
                <div class="product-img"></div>
                
            </div>
            <a href="product-info.html"><button class="add-btn">Go To</button></a>
        </div>

        <div class="section-admin">
            <div class="section-header">User Information</div>

            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
                </thead>
                <!-- remove this entries to fetch data from user-info table till <tbody> tag-->
                <tr>
                    <td>Send welcome email</td>
                    <td><span>04 Apr 2030</span></td>
                </tr>
                <tr>
                    <td>Setup completion</td>
                    <td><span>11 Apr 2030</span></td>
                </tr>
                <tr>
                    <td>Share tutorial links</td>
                    <td><span>18 Apr 2030</span></td>
                </tr>
                <tbody id="dashboardUserTable"></tbody>
            </table>

        </div>

    </div>

</div>

<!-- product input Form -->
<div class="add-product" id="productModal">

    <div class="product-form-container">

        <span class="close-btn" onclick="closeProductForm()">×</span>
        <h2>Add New Category</h2>

        <form class="product-form">

            <div class="form-group">
                <label>Category Name</label>
                <input type="text" id="productName" placeholder="Enter Category name">
            </div>

            <div class="form-group">
                <label>Category logo</label>
                <input type="file" id="productImage">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="productDesc" placeholder="Enter Category description"></textarea>
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Sub Category</label>
                    <input type="text" id="price" placeholder="None">
                </div>

                <div class="form-group">
                    <label>Sub-Category Logo</label>
                    <input type="file" id="stock" placeholder="Add Logo ">
                </div>

            </div>

            

            <button type="button" class="add-product-btn" onclick="addProduct()">
                Add Category
            </button>

        </form>

    </div>
</div>

<script src="../src/scripts/admin/Admin_load_Nos.js" defer></script>
<script src="../src/scripts/pages/product-info.js" defer></script>
<script src="../src/scripts/admin/Admin-products.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../src/scripts/admin/Admin-charts.js" defer></script>
</body>
</html>
