<script>
document.addEventListener("DOMContentLoaded", function () {
    const logoutBtn = document.getElementById("logoutBtn");

    if (!logoutBtn) return;

    logoutBtn.addEventListener("click", async function () {
        try {
            const apiBase =
                window.location.port === "5500"
                    ? "http://127.0.0.1:5000"
                    : "";

            await fetch(`${apiBase}/api/logout`, {
                method: "POST",
                credentials: "include"
            });

            alert("Please login to access Fanfinity.");

            if (window.location.port === "5500") {
                window.location.href = "http://127.0.0.1:5500/home.html";
            } else {
                window.location.href = "/home.html";
            }
        } catch (err) {
            console.error("Logout failed:", err);
            alert("Logout failed");
        }
    });
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const apiBase =
        window.location.port === "5500"
            ? "http://127.0.0.1:5000"
            : "";

    fetch(`${apiBase}/api/me`, { credentials: "include" })
        .then(res => {
            if (!res.ok) throw new Error("Not authorized");
            return res.json();
        })
        .then(data => {
            if (data.role !== "admin") {
                alert("Access denied. Please login as admin.");

                if (window.location.port === "5500") {
                    window.location.href = "http://127.0.0.1:5500/home.html";
                } else {
                    window.location.href = "/home.html";
                }
            }
        })
        .catch(() => {
            alert("Access denied. Please login as admin.");

            if (window.location.port === "5500") {
                window.location.href = "http://127.0.0.1:5500/home.html";
            } else {
                window.location.href = "/home.html";
            }
        });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const track = document.getElementById("categoriesTrack");
    const prev = document.getElementById("categoryPrevBtn");
    const next = document.getElementById("categoryNextBtn");

    let position = 0;
    const moveAmount = 250;

    next.addEventListener("click", () => {
        position -= moveAmount;
        track.style.transform = `translateX(${position}px)`;
    });

    prev.addEventListener("click", () => {
        position += moveAmount;
        if (position > 0) position = 0;
        track.style.transform = `translateX(${position}px)`;
    });
});
</script>

<script>
async function addProduct() {
    const name = document.getElementById("categoryName").value;
    const isSub = document.getElementById("isSubcategory").value;
    const parent = document.getElementById("parentCategory").value;

    const apiBase = window.location.port === "5500"
        ? "http://127.0.0.1:5000"
        : "";

    try {
        const res = await fetch(`${apiBase}/api/admin/categories`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
                category_name: name,
                parent_category_id: isSub === "yes" ? parent : null
            })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        alert("Category added successfully");
        location.reload();

    } catch (err) {
        console.error(err);
        alert("Failed to add category");
    }
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const hasSubcategory = document.getElementById("hasSubcategory");
    const subcategoryFields = document.getElementById("subcategoryFields");

    if (hasSubcategory && subcategoryFields) {
        hasSubcategory.addEventListener("change", function () {
            subcategoryFields.style.display = this.value === "yes" ? "block" : "none";
        });
    }
});
</script>


<script>
document.addEventListener("DOMContentLoaded", () => {
    const track = document.getElementById("categoriesTrack");
    const prevBtn = document.getElementById("categoryPrevBtn");
    const nextBtn = document.getElementById("categoryNextBtn");

    if (!track || !prevBtn || !nextBtn) return;

    let position = 0;
    const moveAmount = 260;

    function updateArrowVisibility() {
        const totalCategories = track.children.length;

        if (totalCategories > 4) {
            prevBtn.classList.add("show");
            nextBtn.classList.add("show");
        } else {
            prevBtn.classList.remove("show");
            nextBtn.classList.remove("show");
            position = 0;
            track.style.transform = `translateX(0px)`;
        }
    }

    nextBtn.addEventListener("click", () => {
        const maxScroll = track.scrollWidth - track.parentElement.clientWidth;
        position -= moveAmount;

        if (Math.abs(position) > maxScroll) {
            position = -maxScroll;
        }

        track.style.transform = `translateX(${position}px)`;
    });

    prevBtn.addEventListener("click", () => {
        position += moveAmount;

        if (position > 0) {
            position = 0;
        }

        track.style.transform = `translateX(${position}px)`;
    });

    updateArrowVisibility();
});
</script>
